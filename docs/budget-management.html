<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>가계부 - 예산 관리</title>
  <link rel="stylesheet" href="household-budget.css?v=9">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="app-icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#2563eb">
  <script src="household-budget-db.js?v=16"></script>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">
          <h1>가계부</h1>
          <p>정산월 기준 관리</p>
        </div>
        <label class="global-month">
          <span>정산월</span>
          <select name="globalSettlementMonth" aria-label="정산월 선택">
            <option>2026년 12월</option>
            <option>2026년 11월</option>
            <option>2026년 10월</option>
            <option>2026년 9월</option>
            <option>2026년 8월</option>
            <option selected>2026년 7월</option>
            <option>2026년 6월</option>
            <option>2026년 5월</option>
            <option>2026년 4월</option>
            <option>2026년 3월</option>
            <option>2026년 2월</option>
            <option>2026년 1월</option>
          </select>
        </label>
      </div>
      <nav class="nav">
        <a href="household-budget-planning.html">대시보드</a>
        <a href="expense-management.html">지출 관리</a>
        <a class="active" href="budget-management.html">예산 관리</a>
        <a href="loan-management.html">대출 관리</a>
        <a href="reserve-management.html">비상금 관리</a>
        <a href="database-management.html">DB 관리</a>
      </nav>
    </aside>
    <div class="content">
      <header class="topbar">
        <div>
          <h2>예산 관리</h2>
        </div>
      </header>
      <section class="summary-strip" aria-label="예산 요약">
        <div class="summary-item">
          <span>예산</span>
          <strong>—</strong>
        </div>
        <div class="summary-item">
          <span>지금까지의 지출 금액</span>
          <strong>—</strong>
        </div>
        <div class="summary-item">
          <span>잔여 가용 금액</span>
          <strong>—</strong>
        </div>
      </section>
      <main class="expense-main">
        <div class="toolbar is-sticky">
          <div class="toolbar-total">
            <span>이번 달 예산 총액</span>
            <strong>—</strong>
          </div>
          <div class="toolbar-actions">
            <button class="button" id="copyFixedBudgetMonth" type="button">고정예산 불러오기</button>
            <button class="button primary" id="openBudgetModal">예산 등록</button>
          </div>
        </div>
        <div class="grid">
          <section class="card span-12">
            <h3>고정 예산 리스트</h3>
            <table>
              <thead>
                <tr>
                  <th>항목</th>
                  <th>구분</th>
                  <th>반복</th>
                  <th>설명</th>
                  <th class="amount">금액</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </section>
          <section class="card span-12">
            <h3>추가 예산 리스트</h3>
            <table>
              <thead>
                <tr>
                  <th>발생일</th>
                  <th>유형</th>
                  <th>내용</th>
                  <th class="amount">선지급</th>
                  <th class="amount">회수 금액</th>
                  <th>상태</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </section>
        </div>
      </main>
    </div>
  </div>

  <div class="modal-backdrop" id="budgetModal" aria-hidden="true">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="budgetModalTitle">
      <div class="modal-head">
        <h3 id="budgetModalTitle">예산 등록/편집</h3>
        <button class="button budget-modal-close">닫기</button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div>
            <label for="budgetKind">예산 유형</label>
            <select class="control" id="budgetKind">
              <option value="">선택</option>
              <option value="fixed">고정 예산</option>
              <option value="extra">추가 예산</option>
            </select>
          </div>
          <div>
            <label for="budgetName">항목</label>
            <input class="control" id="budgetName">
          </div>
          <div>
            <label for="budgetAmount">금액</label>
            <input class="control" id="budgetAmount">
          </div>
          <div id="fixedBudgetFields" class="conditional-panel">
            <div class="form-grid">
              <div>
                <label for="fixedBudgetCycle">반복</label>
                <select class="control" id="fixedBudgetCycle">
                  <option value="">선택</option>
                  <option>매월</option>
                  <option>이번 달만</option>
                  <option>다음 달부터</option>
                </select>
              </div>
              <div>
                <label for="fixedBudgetDescription">설명</label>
                <input class="control" id="fixedBudgetDescription">
              </div>
            </div>
          </div>
          <div id="extraBudgetFields" class="conditional-panel is-hidden">
            <div class="form-grid">
              <div>
                <label for="extraBudgetType">추가 유형</label>
                <select class="control" id="extraBudgetType">
                  <option value="">선택</option>
                  <option>선지급 회수</option>
                  <option>현금 추가</option>
                </select>
              </div>
              <div id="extraBudgetStatusField">
                <label for="extraBudgetStatus">상태</label>
                <select class="control" id="extraBudgetStatus">
                  <option value="">선택</option>
                  <option>예정</option>
                  <option>회수 대기</option>
                  <option>반영 완료</option>
                </select>
              </div>
              <div id="prepaidAmountField">
                <label for="prepaidAmount">선지급 금액</label>
                <input class="control" id="prepaidAmount">
              </div>
              <div id="collectedAmountField">
                <label for="collectedAmount">회수 금액</label>
                <input class="control" id="collectedAmount">
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="button danger budget-delete-button" type="button" data-confirm-delete data-delete-label="예산 항목">삭제</button>
        <button class="button budget-modal-close">취소</button>
        <button class="button primary">저장</button>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="recoveryModal" aria-hidden="true">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="recoveryModalTitle">
      <div class="modal-head">
        <h3 id="recoveryModalTitle">회수 처리</h3>
        <button class="button recovery-modal-close">닫기</button>
      </div>
      <div class="modal-body">
        <p class="note">선지급한 금액을 현금으로 회수하면 해당 월 예산에 회수 금액만큼 추가됩니다.</p>
        <div class="form-grid">
          <div>
            <label>항목</label>
            <div class="field">—</div>
          </div>
          <div>
            <label>선지급 금액</label>
            <div class="field">—</div>
          </div>
          <div>
            <label for="recoveredDate">회수일</label>
            <input class="control" id="recoveredDate" type="date">
          </div>
          <div>
            <label for="recoveredAmount">회수 금액</label>
            <input class="control" id="recoveredAmount">
          </div>
          <div>
            <label>처리 후 상태</label>
            <div class="field">반영 완료</div>
          </div>
          <div>
            <label>예산 반영</label>
            <div class="field">—</div>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="button recovery-modal-close">취소</button>
        <button class="button primary">회수 처리</button>
      </div>
    </section>
  </div>


  <div class="modal-backdrop" id="monthActionModal" aria-hidden="true">
    <section class="modal confirm-modal" role="dialog" aria-modal="true" aria-labelledby="monthActionTitle">
      <div class="modal-head">
        <h3 id="monthActionTitle">정산월 처리</h3>
        <button class="button month-action-close" type="button">닫기</button>
      </div>
      <div class="modal-body">
        <p class="note" id="monthActionMessage"></p>
      </div>
      <div class="modal-actions">
        <button class="button month-action-close" type="button">취소</button>
        <button class="button primary" type="button" id="monthActionConfirm">확인</button>
      </div>
    </section>
  </div>


  <script>
    const summaryStrip = document.querySelector(".summary-strip");
    const sidebar = document.querySelector(".sidebar");
    const topbar = document.querySelector(".topbar");

    function syncStickyOffsets() {
      const desktopLayout = window.matchMedia("(min-width: 1100px)").matches;
      const summaryTop = desktopLayout ? topbar.offsetHeight : sidebar.offsetHeight;
      const toolbarTop = summaryTop + summaryStrip.offsetHeight;
      document.documentElement.style.setProperty("--summary-top", `${summaryTop}px`);
      document.documentElement.style.setProperty("--expense-toolbar-top", `${toolbarTop}px`);
    }

    window.addEventListener("resize", syncStickyOffsets);
    window.addEventListener("load", syncStickyOffsets);
    syncStickyOffsets();

    const modal = document.getElementById("budgetModal");
    const openButton = document.getElementById("openBudgetModal");
    const budgetKind = document.getElementById("budgetKind");
    const fixedBudgetFields = document.getElementById("fixedBudgetFields");
    const extraBudgetFields = document.getElementById("extraBudgetFields");
    const budgetDeleteButton = document.querySelector(".budget-delete-button");
    const extraBudgetType = document.getElementById("extraBudgetType");
    const extraBudgetStatusField = document.getElementById("extraBudgetStatusField");
    const prepaidAmountField = document.getElementById("prepaidAmountField");
    const collectedAmountField = document.getElementById("collectedAmountField");
    const settlementMonthSelect = document.querySelector("[name='globalSettlementMonth']");
    const monthActionModal = document.getElementById("monthActionModal");
    const monthActionMessage = document.getElementById("monthActionMessage");
    let latestBudgetSnapshot = null;
    let currentBudgetEdit = null;
    let currentRecoveryEdit = null;

    function closeMonthAction() {
      monthActionModal.classList.remove("open");
      monthActionModal.setAttribute("aria-hidden", "true");
    }

    function previousSettlementMonth(month) {
      const match = String(month || "").match(/^(\d{4})-(\d{2})$/);
      if (!match) return "";
      const date = new Date(Number(match[1]), Number(match[2]) - 2, 1);
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function formatCurrency(value) {
      const numberValue = window.HouseholdBudgetDB?.numberValue
        ? HouseholdBudgetDB.numberValue(value)
        : Number(String(value ?? 0).replace(/[^0-9.-]/g, "")) || 0;
      return `₩${Math.round(numberValue).toLocaleString("ko-KR")}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function setSummaryItem(index, amount) {
      const item = document.querySelectorAll(".summary-strip .summary-item strong")[index];
      if (item) item.textContent = formatCurrency(amount);
    }

    function numberValue(value) {
      return window.HouseholdBudgetDB?.numberValue
        ? HouseholdBudgetDB.numberValue(value)
        : Number(String(value ?? 0).replace(/[^0-9.-]/g, "")) || 0;
    }

    function sumRows(rows, key = "amount") {
      return rows.reduce((total, row) => total + numberValue(row[key]), 0);
    }

    function calculateBudgetSummary(snapshot) {
      const fixedRows = snapshot.rows.fixed_expenses || [];
      const expenseRows = snapshot.rows.expenses || [];
      const allowanceBudget = sumRows(fixedRows.filter((row) => row.title === "용돈"));
      const publicFixedTotal = sumRows(fixedRows.filter((row) => row.title !== "용돈"));
      const fixedTotal = publicFixedTotal + allowanceBudget;
      const publicSpent = sumRows(expenseRows.filter((row) => row.expense_type === "variable" && row.ledger_type === "public"));
      const totalBudget = numberValue(snapshot.summary.total_budget);
      const livingBudget = totalBudget - fixedTotal;
      return {
        totalBudget,
        publicSettlementSpent: fixedTotal + publicSpent,
        publicRemaining: livingBudget - publicSpent,
      };
    }

    function fixedBudgetMarkup(row) {
      return `
        <tr data-id="${escapeHtml(row.budget_id || "")}">
          <td class="editable-cell"><button class="link-button budget-modal-trigger" data-budget-kind="fixed">${escapeHtml(row.title)}</button></td>
          <td>수입</td>
          <td>매월</td>
          <td>${escapeHtml(row.memo || "고정 예산")}</td>
          <td class="amount editable-cell"><button class="amount-button budget-modal-trigger" data-budget-kind="fixed">${formatCurrency(row.amount)}</button></td>
        </tr>
      `;
    }

    function extraBudgetLabel(row) {
      if (row.extra_type === "cash_add") return "현금 추가";
      if (row.extra_type === "reimbursement") return "선지급 회수";
      return "추가 예산";
    }

    function extraStatusMarkup(row) {
      if (row.recovery_status === "collected") return `<span class="badge green">반영 완료</span>`;
      if (row.recovery_status === "pending") return `<button class="badge amber recovery-trigger" data-id="${escapeHtml(row.budget_id || "")}">회수 대기</button>`;
      return `<span class="badge blue">예정</span>`;
    }

    function extraBudgetMarkup(row) {
      return `
        <tr data-id="${escapeHtml(row.budget_id || "")}">
          <td>${escapeHtml(row.recovered_date || "-")}</td>
          <td>${extraBudgetLabel(row)}</td>
          <td class="editable-cell"><button class="link-button budget-modal-trigger" data-budget-kind="extra">${escapeHtml(row.title)}</button></td>
          <td class="amount">${row.prepaid_amount ? formatCurrency(row.prepaid_amount) : "-"}</td>
          <td class="amount editable-cell"><button class="amount-button budget-modal-trigger" data-budget-kind="extra">${formatCurrency(row.collected_amount || row.amount)}</button></td>
          <td>${extraStatusMarkup(row)}</td>
        </tr>
      `;
    }

    function renderBudgetPage(snapshot) {
      latestBudgetSnapshot = snapshot;
      const summary = calculateBudgetSummary(snapshot);
      setSummaryItem(0, summary.totalBudget);
      setSummaryItem(1, summary.publicSettlementSpent);
      setSummaryItem(2, summary.publicRemaining);
      const toolbarTotal = document.querySelector(".toolbar-total strong");
      if (toolbarTotal) toolbarTotal.textContent = formatCurrency(summary.totalBudget);

      const fixedRows = snapshot.rows.budgets.filter((row) => row.budget_type === "fixed");
      const extraRows = snapshot.rows.budgets.filter((row) => row.budget_type === "extra");
      const sections = Array.from(document.querySelectorAll(".card"));
      const fixedBody = sections.find((section) => section.querySelector("h3")?.textContent.trim() === "고정 예산 리스트")?.querySelector("tbody");
      const extraBody = sections.find((section) => section.querySelector("h3")?.textContent.trim() === "추가 예산 리스트")?.querySelector("tbody");
      if (fixedBody) fixedBody.innerHTML = fixedRows.map(fixedBudgetMarkup).join("");
      if (extraBody) {
        extraBody.innerHTML = extraRows.length
          ? extraRows.map(extraBudgetMarkup).join("")
          : `<tr><td colspan="6" class="empty-cell">등록된 추가 예산이 없습니다.</td></tr>`;
      }
      bindRecoveryTriggers();
    }

    document.getElementById("copyFixedBudgetMonth").addEventListener("click", () => {
      const selectedMonth = settlementMonthSelect?.value || "선택한 정산월";
      monthActionMessage.textContent = `${selectedMonth}에 이전 정산월의 고정 예산 항목과 금액을 동일하게 세팅합니다. 추가 예산은 복사하지 않고, 해당 월에서 새로 등록한 값만 반영합니다.`;
      monthActionModal.classList.add("open");
      monthActionModal.setAttribute("aria-hidden", "false");
    });

    document.getElementById("monthActionConfirm").addEventListener("click", async () => {
      const targetMonth = window.HouseholdBudgetDB?.parseKoreanMonth(settlementMonthSelect?.value);
      const sourceMonth = previousSettlementMonth(targetMonth);
      if (window.HouseholdBudgetDB?.getApiUrl() && sourceMonth && targetMonth) {
        await HouseholdBudgetDB.cloneFixedMonth(sourceMonth, targetMonth);
      }
      document.getElementById("copyFixedBudgetMonth").textContent = "고정예산 세팅 완료";
      closeMonthAction();
    });

    document.querySelectorAll(".month-action-close").forEach((button) => {
      button.addEventListener("click", closeMonthAction);
    });

    function syncBudgetKindFields() {
      const isFixed = budgetKind.value === "fixed";
      const isExtra = budgetKind.value === "extra";
      fixedBudgetFields.classList.toggle("is-hidden", !isFixed);
      extraBudgetFields.classList.toggle("is-hidden", !isExtra);
      syncExtraBudgetFields();
    }

    function syncExtraBudgetFields() {
      const isCashAdd = budgetKind.value === "extra" && extraBudgetType.value === "현금 추가";
      extraBudgetStatusField.classList.toggle("is-hidden", isCashAdd);
      prepaidAmountField.classList.toggle("is-hidden", isCashAdd);
      collectedAmountField.classList.toggle("is-hidden", isCashAdd);
    }

    function setSelectValue(select, value) {
      if (!select) return;
      const option = Array.from(select.options).find((item) => item.value === value || item.textContent.trim() === value);
      if (option) select.value = option.value;
    }

    function openBudgetModal() {
      modal.classList.add("open");
      modal.setAttribute("aria-hidden", "false");
    }

    function closeBudgetModal() {
      modal.classList.remove("open");
      modal.setAttribute("aria-hidden", "true");
    }

    function resetBudgetModalForCreate() {
      currentBudgetEdit = null;
      document.getElementById("budgetModalTitle").textContent = "예산 등록";
      budgetKind.value = "";
      document.getElementById("budgetName").value = "";
      document.getElementById("budgetAmount").value = "";
      setSelectValue(document.getElementById("fixedBudgetCycle"), "");
      document.getElementById("fixedBudgetDescription").value = "";
      setSelectValue(document.getElementById("extraBudgetType"), "");
      setSelectValue(document.getElementById("extraBudgetStatus"), "");
      document.getElementById("prepaidAmount").value = "";
      document.getElementById("collectedAmount").value = "";
      budgetDeleteButton.classList.add("is-hidden");
      syncBudgetKindFields();
    }

    function fillBudgetModalFromRow(button) {
      const row = button.closest("tr");
      const cells = Array.from(row.children);
      const kind = button.dataset.budgetKind || "fixed";
      const id = row.dataset.id || "";
      currentBudgetEdit = {
        id,
        source: latestBudgetSnapshot?.rows.budgets.find((item) => item.budget_id === id)
      };
      document.getElementById("budgetModalTitle").textContent = "예산 편집";
      budgetDeleteButton.classList.remove("is-hidden");
      budgetKind.value = kind;
      if (kind === "extra") {
        document.getElementById("budgetName").value = cells[2].textContent.trim();
        document.getElementById("budgetAmount").value = cells[4].textContent.trim();
        setSelectValue(document.getElementById("extraBudgetType"), cells[1].textContent.trim());
        document.getElementById("prepaidAmount").value = cells[3].textContent.trim();
        document.getElementById("collectedAmount").value = cells[4].textContent.trim();
        setSelectValue(document.getElementById("extraBudgetStatus"), cells[5].textContent.trim());
      } else {
        document.getElementById("budgetName").value = cells[0].textContent.trim();
        document.getElementById("budgetAmount").value = cells[4].textContent.trim();
        setSelectValue(document.getElementById("fixedBudgetCycle"), cells[2].textContent.trim());
        document.getElementById("fixedBudgetDescription").value = cells[3].textContent.trim();
      }
      syncBudgetKindFields();
      openBudgetModal();
    }

    async function saveBudgetModal() {
      if (!window.HouseholdBudgetDB?.getApiUrl()) throw new Error("Google Sheets 연동 URL이 필요합니다.");
      const settlementMonth = HouseholdBudgetDB.parseKoreanMonth(settlementMonthSelect?.value);
      const kind = budgetKind.value;
      const title = document.getElementById("budgetName").value.trim();
      const amount = numberValue(document.getElementById("budgetAmount").value);
      const extraTypeLabel = document.getElementById("extraBudgetType").value;
      const isCashAdd = kind === "extra" && extraTypeLabel === "현금 추가";
      const now = new Date().toISOString().slice(0, 10);
      if (!kind || !title || !amount || !settlementMonth) throw new Error("예산 유형, 항목, 금액, 정산월을 확인해주세요.");

      await HouseholdBudgetDB.upsert("monthly_budgets", {
        ...(currentBudgetEdit?.source || {}),
        budget_id: currentBudgetEdit?.id || undefined,
        settlement_month: settlementMonth,
        budget_type: kind,
        title,
        amount,
        extra_type: kind === "extra" ? (isCashAdd ? "cash_add" : "reimbursement") : "",
        prepaid_amount: kind === "extra" && !isCashAdd ? numberValue(document.getElementById("prepaidAmount").value) : "",
        collected_amount: kind === "extra" ? (isCashAdd ? amount : numberValue(document.getElementById("collectedAmount").value || amount)) : "",
        recovery_status: kind === "extra" ? (isCashAdd ? "collected" : statusToValue(document.getElementById("extraBudgetStatus").value)) : "none",
        recovered_date: currentBudgetEdit?.source?.recovered_date || "",
        memo: kind === "fixed" ? document.getElementById("fixedBudgetDescription").value : "",
        created_at: currentBudgetEdit?.source?.created_at || now,
      });
      await HouseholdBudgetDB.refreshPage();
      closeBudgetModal();
    }

    function statusToValue(label) {
      if (label === "반영 완료") return "collected";
      if (label === "회수 대기") return "pending";
      return "scheduled";
    }

    async function deleteCurrentBudget() {
      if (!currentBudgetEdit?.id) return;
      await HouseholdBudgetDB.remove("monthly_budgets", currentBudgetEdit.id, HouseholdBudgetDB.parseKoreanMonth(settlementMonthSelect?.value));
      await HouseholdBudgetDB.refreshPage();
      closeBudgetModal();
    }

    openButton.addEventListener("click", () => {
      resetBudgetModalForCreate();
      openBudgetModal();
    });

    document.addEventListener("click", (event) => {
      const button = event.target.closest(".budget-modal-trigger");
      if (button) fillBudgetModalFromRow(button);
    });

    document.querySelectorAll(".budget-modal-close").forEach((button) => {
      button.addEventListener("click", closeBudgetModal);
    });
    modal.querySelector(".modal-actions .button.primary").addEventListener("click", async () => {
      const button = modal.querySelector(".modal-actions .button.primary");
      button.disabled = true;
      button.textContent = "저장 중";
      try {
        await saveBudgetModal();
      } catch (error) {
        alert(error.message || "저장에 실패했습니다.");
      } finally {
        button.disabled = false;
        button.textContent = "저장";
      }
    });

    const recoveryModal = document.getElementById("recoveryModal");
    function bindRecoveryTriggers() {
      document.querySelectorAll(".recovery-trigger").forEach((button) => {
        button.addEventListener("click", () => {
          const id = button.dataset.id;
          currentRecoveryEdit = latestBudgetSnapshot?.rows.budgets.find((row) => row.budget_id === id) || null;
          const fields = recoveryModal.querySelectorAll(".field");
          if (fields[0]) fields[0].textContent = currentRecoveryEdit?.title || "—";
          if (fields[1]) fields[1].textContent = formatCurrency(currentRecoveryEdit?.prepaid_amount || 0);
          if (fields[3]) fields[3].textContent = formatCurrency(currentRecoveryEdit?.collected_amount || currentRecoveryEdit?.amount || 0);
          document.getElementById("recoveredDate").value = new Date().toISOString().slice(0, 10);
          document.getElementById("recoveredAmount").value = formatCurrency(currentRecoveryEdit?.collected_amount || currentRecoveryEdit?.amount || 0);
        recoveryModal.classList.add("open");
        recoveryModal.setAttribute("aria-hidden", "false");
        });
      });
    }

    document.querySelectorAll(".recovery-modal-close").forEach((button) => {
      button.addEventListener("click", () => {
        recoveryModal.classList.remove("open");
        recoveryModal.setAttribute("aria-hidden", "true");
      });
    });
    recoveryModal.querySelector(".modal-actions .button.primary").addEventListener("click", async () => {
      if (!currentRecoveryEdit) return;
      await HouseholdBudgetDB.upsert("monthly_budgets", {
        ...currentRecoveryEdit,
        recovery_status: "collected",
        recovered_date: document.getElementById("recoveredDate").value,
        collected_amount: numberValue(document.getElementById("recoveredAmount").value),
        amount: numberValue(document.getElementById("recoveredAmount").value),
      });
      recoveryModal.classList.remove("open");
      await HouseholdBudgetDB.refreshPage();
    });

    budgetKind.addEventListener("change", syncBudgetKindFields);
    extraBudgetType.addEventListener("change", syncExtraBudgetFields);
    settlementMonthSelect?.addEventListener("change", async () => {
      const month = HouseholdBudgetDB.parseKoreanMonth(settlementMonthSelect?.value);
      await HouseholdBudgetDB.ensureSettlementMonthInitialized(month);
      await HouseholdBudgetDB.refreshPage();
    });
    syncExtraBudgetFields();

    window.__householdBudgetConfirmDelete = async () => {
      if (modal.classList.contains("open")) await deleteCurrentBudget();
    };

    window.HouseholdBudgetDB?.hydratePage(renderBudgetPage);

  </script>
<div class="modal-backdrop" id="deleteConfirmModal" aria-hidden="true">
  <section class="modal confirm-modal" role="dialog" aria-modal="true" aria-labelledby="deleteConfirmTitle">
    <div class="modal-head">
      <h3 id="deleteConfirmTitle">삭제 확인</h3>
      <button class="button delete-confirm-close" type="button">닫기</button>
    </div>
    <div class="modal-body">
      <p class="note" id="deleteConfirmMessage">선택한 항목을 삭제할까요?</p>
    </div>
    <div class="modal-actions">
      <button class="button delete-confirm-close" type="button">취소</button>
      <button class="button danger" type="button" id="deleteConfirmAction">삭제</button>
    </div>
  </section>
</div>

<script>
  (() => {
    const deleteConfirmModal = document.getElementById("deleteConfirmModal");
    const deleteConfirmMessage = document.getElementById("deleteConfirmMessage");
    const closeDeleteConfirm = () => {
      deleteConfirmModal.classList.remove("open");
      deleteConfirmModal.setAttribute("aria-hidden", "true");
    };

    document.querySelectorAll("[data-confirm-delete]").forEach((button) => {
      button.addEventListener("click", () => {
        const label = button.dataset.deleteLabel || "항목";
        deleteConfirmMessage.textContent = `${label}을 삭제할까요?`;
        deleteConfirmModal.classList.add("open");
        deleteConfirmModal.setAttribute("aria-hidden", "false");
      });
    });

    document.querySelectorAll(".delete-confirm-close").forEach((button) => {
      button.addEventListener("click", closeDeleteConfirm);
    });

    document.getElementById("deleteConfirmAction").addEventListener("click", async () => {
      if (typeof window.__householdBudgetConfirmDelete === "function") {
        await window.__householdBudgetConfirmDelete();
      }
      closeDeleteConfirm();
    });
    deleteConfirmModal.addEventListener("click", (event) => {
      if (event.target === deleteConfirmModal) closeDeleteConfirm();
    });
  })();
</script>
</body>
</html>
