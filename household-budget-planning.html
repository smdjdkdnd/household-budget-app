<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>가계부 - 대시보드</title>
  <link rel="stylesheet" href="household-budget.css?v=7">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="app-icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#2563eb">
  <script src="household-budget-db.js?v=8"></script>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">
          <h1>가계부</h1>
          <p>정산월 기준 관리</p>
        </div>
        <label class="global-month">
          <span>정산월</span>
          <select name="globalSettlementMonth" aria-label="정산월 선택">
            <option>2026년 12월</option>
            <option>2026년 11월</option>
            <option>2026년 10월</option>
            <option>2026년 9월</option>
            <option>2026년 8월</option>
            <option selected>2026년 7월</option>
            <option>2026년 6월</option>
            <option>2026년 5월</option>
            <option>2026년 4월</option>
            <option>2026년 3월</option>
            <option>2026년 2월</option>
            <option>2026년 1월</option>
          </select>
        </label>
      </div>
      <nav class="nav">
        <a class="active" href="household-budget-planning.html">대시보드</a>
        <a href="expense-management.html">지출 관리</a>
        <a href="budget-management.html">예산 관리</a>
        <a href="loan-management.html">대출 관리</a>
        <a href="reserve-management.html">비상금 관리</a>
        <a href="database-management.html">DB 관리</a>
      </nav>
    </aside>

    <div class="content">
      <header class="topbar">
        <div>
          <h2>대시보드</h2>
        </div>
      </header>

      <main>
        <div class="grid">
          <section class="card span-12 budget-chart-card">
            <div class="card-head">
              <h3>예산 흐름</h3>
              <span class="total-pill">총 예산 <strong data-summary="total_budget">—</strong></span>
            </div>
            <div class="budget-stack" aria-label="예산 구성 그래프">
              <span class="budget-segment fixed" data-segment="fixed" style="width: 0%;" title="고정비"></span>
              <span class="budget-segment spent" data-segment="spent" style="width: 0%;" title="생활비 사용액"></span>
              <span class="budget-segment remaining" data-segment="remaining" style="width: 0%;" title="생활비 잔액"></span>
            </div>
            <div class="budget-legend">
              <div>
                <span class="legend-dot fixed"></span>
                <small>고정비</small>
                <strong data-summary="fixed_total">—</strong>
                <em data-percent="fixed">—</em>
              </div>
              <div>
                <span class="legend-dot spent"></span>
                <small>생활비 사용액</small>
                <strong data-summary="public_spent">—</strong>
                <em data-percent="spent">—</em>
              </div>
              <div>
                <span class="legend-dot remaining"></span>
                <small>생활비 잔액</small>
                <strong data-summary="public_remaining">—</strong>
                <em data-percent="remaining">—</em>
              </div>
            </div>
          </section>

          <section class="card span-12">
            <h3>생활비 지출 현황</h3>
            <table>
              <thead>
                <tr>
                  <th>항목</th>
                  <th class="amount">배정액</th>
                  <th class="amount">사용액</th>
                  <th class="amount">잔액</th>
                  <th>사용률</th>
                </tr>
              </thead>
              <tbody>
                <tr><td>공금 생활비</td><td class="amount" data-summary="living_budget">—</td><td class="amount" data-summary="public_spent">—</td><td class="amount" data-summary="public_remaining">—</td><td><span class="badge green" data-rate="public">—</span></td></tr>
                <tr><td>용돈</td><td class="amount" data-summary="allowance_budget">—</td><td class="amount" data-summary="allowance_spent">—</td><td class="amount" data-summary="allowance_remaining">—</td><td><span class="badge amber" data-rate="allowance">—</span></td></tr>
              </tbody>
            </table>
          </section>

          <section class="card span-12">
            <h3>은행별 출금 예정</h3>
            <table>
              <thead>
                <tr>
                  <th>은행/카드</th>
                  <th class="amount">예정액</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </section>
        </div>
      </main>
    </div>
  </div>
<div class="modal-backdrop" id="deleteConfirmModal" aria-hidden="true">
  <section class="modal confirm-modal" role="dialog" aria-modal="true" aria-labelledby="deleteConfirmTitle">
    <div class="modal-head">
      <h3 id="deleteConfirmTitle">삭제 확인</h3>
      <button class="button delete-confirm-close" type="button">닫기</button>
    </div>
    <div class="modal-body">
      <p class="note" id="deleteConfirmMessage">선택한 항목을 삭제할까요?</p>
    </div>
    <div class="modal-actions">
      <button class="button delete-confirm-close" type="button">취소</button>
      <button class="button danger" type="button" id="deleteConfirmAction">삭제</button>
    </div>
  </section>
</div>

<script>
  (() => {
    function setText(selector, value) {
      document.querySelectorAll(selector).forEach((element) => {
        element.textContent = value;
      });
    }

    function percent(part, total) {
      return total ? `${((part / total) * 100).toFixed(1)}%` : "0%";
    }

    function sumRows(rows, key = "amount") {
      return rows.reduce((total, row) => total + HouseholdBudgetDB.numberValue(row[key]), 0);
    }

    function calculateDashboardSummary(snapshot) {
      const fixedRows = snapshot.rows.fixed_expenses || [];
      const expenseRows = snapshot.rows.expenses || [];
      const allowanceBudget = sumRows(fixedRows.filter((row) => row.title === "용돈"));
      const publicFixedTotal = sumRows(fixedRows.filter((row) => row.title !== "용돈"));
      const publicSpent = sumRows(expenseRows.filter((row) => row.expense_type === "variable" && row.ledger_type === "public"));
      const allowanceSpent = sumRows(expenseRows.filter((row) => row.ledger_type === "allowance"));
      const totalBudget = HouseholdBudgetDB.numberValue(snapshot.summary.total_budget);
      const livingBudget = totalBudget - allowanceBudget - publicFixedTotal;
      return {
        totalBudget,
        fixedTotal: publicFixedTotal + allowanceBudget,
        publicFixedTotal,
        livingBudget,
        publicSpent,
        publicRemaining: livingBudget - publicSpent,
        allowanceBudget,
        allowanceSpent,
        allowanceRemaining: allowanceBudget - allowanceSpent,
      };
    }

    window.HouseholdBudgetDB?.hydratePage((snapshot) => {
      const summary = calculateDashboardSummary(snapshot);
      const won = HouseholdBudgetDB.formatWon;
      const totalBudget = summary.totalBudget;
      const fixedTotal = summary.fixedTotal;
      const livingBudget = summary.livingBudget;
      const publicSpent = summary.publicSpent;
      const publicRemaining = summary.publicRemaining;
      const allowanceBudget = summary.allowanceBudget;
      const allowanceSpent = summary.allowanceSpent;
      const allowanceRemaining = summary.allowanceRemaining;
      const total = totalBudget || 1;
      setText("[data-summary='total_budget']", won(totalBudget));
      setText("[data-summary='fixed_total']", won(fixedTotal));
      setText("[data-summary='living_budget']", won(livingBudget));
      setText("[data-summary='public_spent']", won(publicSpent));
      setText("[data-summary='public_remaining']", won(publicRemaining));
      setText("[data-summary='allowance_budget']", won(allowanceBudget));
      setText("[data-summary='allowance_spent']", won(allowanceSpent));
      setText("[data-summary='allowance_remaining']", won(allowanceRemaining));

      const fixedPercent = percent(fixedTotal, total);
      const spentPercent = percent(publicSpent, total);
      const remainingPercent = percent(publicRemaining, total);
      document.querySelector("[data-segment='fixed']").style.width = fixedPercent;
      document.querySelector("[data-segment='spent']").style.width = spentPercent;
      document.querySelector("[data-segment='remaining']").style.width = remainingPercent;
      setText("[data-percent='fixed']", fixedPercent);
      setText("[data-percent='spent']", spentPercent);
      setText("[data-percent='remaining']", remainingPercent);
      setText("[data-rate='public']", livingBudget ? `${Math.round((publicSpent / livingBudget) * 100)}%` : "0%");
      setText("[data-rate='allowance']", allowanceBudget ? `${Math.round((allowanceSpent / allowanceBudget) * 100)}%` : "0%");
    });

    const deleteConfirmModal = document.getElementById("deleteConfirmModal");
    const deleteConfirmMessage = document.getElementById("deleteConfirmMessage");
    const closeDeleteConfirm = () => {
      deleteConfirmModal.classList.remove("open");
      deleteConfirmModal.setAttribute("aria-hidden", "true");
    };

    document.querySelectorAll("[data-confirm-delete]").forEach((button) => {
      button.addEventListener("click", () => {
        const label = button.dataset.deleteLabel || "항목";
        deleteConfirmMessage.textContent = `${label}을 삭제할까요?`;
        deleteConfirmModal.classList.add("open");
        deleteConfirmModal.setAttribute("aria-hidden", "false");
      });
    });

    document.querySelectorAll(".delete-confirm-close").forEach((button) => {
      button.addEventListener("click", closeDeleteConfirm);
    });

    document.getElementById("deleteConfirmAction").addEventListener("click", closeDeleteConfirm);
    deleteConfirmModal.addEventListener("click", (event) => {
      if (event.target === deleteConfirmModal) closeDeleteConfirm();
    });
  })();
</script>
</body>
</html>
